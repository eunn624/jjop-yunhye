<!doctype html>
<html lang="ko" class="antialiased selection:bg-[#FFC107] selection:text-zinc-900">
<head>
<meta charset="utf-8" />
<title>먹숭이 — 팀비 알차게 쓰자</title>
<link rel="stylesheet" href="wds/colors_and_type.css" />

<!-- Tailwind + Iconify (Supanova 디자인 호환) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Pretendard', 'system-ui', 'sans-serif'] },
        colors: {
          primary: {
            DEFAULT: '#FFC107', hover: '#FFB300', active: '#FF9F00',
            accent: '#B07900', light: '#FFF8E1',
          },
          surface: '#f7f7f8',
          like: { DEFAULT: '#c2185b', bg: '#fff0f3', border: '#ff4d6d' },
        },
        animation: {
          'float-slow': 'float 5s ease-in-out infinite',
          'bubble-1': 'bubbleBob 3.2s ease-in-out infinite',
          'bubble-2': 'bubbleBob 3.2s ease-in-out infinite 1.4s',
        },
        keyframes: {
          float: {
            '0%, 100%': { transform: 'translateY(0)' },
            '50%':      { transform: 'translateY(-14px)' },
          },
          bubbleBob: {
            '0%, 100%': { transform: 'scale(1) rotate(0deg)' },
            '50%':      { transform: 'scale(1.03) rotate(2deg)' },
          },
        },
      },
    },
  };
</script>

<style>
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body { background: #f7f7f8; color: #1b1c1e; font-family: 'Pretendard', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Glass nav (Supanova) */
  .glass-nav {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 -1px 0 0 rgba(0,0,0,0.05), 0 4px 24px -8px rgba(0,0,0,0.06);
  }

  /* Double-bezel card (Supanova) */
  .double-bezel {
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(0, 0, 0, 0.04);
    padding: 0.375rem;
    border-radius: 1.5rem;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.05);
  }
  .double-bezel-inner {
    background: #ffffff;
    border-radius: calc(1.5rem - 0.375rem);
    box-shadow: inset 0 1px 1px rgba(255,255,255,1), 0 2px 8px rgba(0,0,0,0.02);
    border: 1px solid rgba(0,0,0,0.04);
  }

  .comment-box {
    background-color: #fffaf0;
    border: 1px solid #ffe1b3;
  }

  /* Scroll reveal */
  .reveal-base {
    opacity: 0;
    transform: translateY(30px);
    filter: blur(4px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal-active {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }

  /* 위저드 페이지 wrapper — 기존 컴포넌트 호환용 */
  .wizard-page { max-width: 760px; margin: 0 auto; padding: 96px 24px 48px; box-sizing: border-box; width: 100%; }
  @media (max-width: 600px) { .wizard-page { padding: 96px 16px 32px; } }

  /* 위저드/결과 step transition */
  .step-enter { opacity: 0; transform: translateY(8px); }
  .step-shown { opacity: 1; transform: translateY(0);
    transition: opacity .35s cubic-bezier(.2,.7,.3,1), transform .35s cubic-bezier(.2,.7,.3,1); }

  /* Mascot float (랜딩) */
  @keyframes mascotFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  .mascot-float { animation: mascotFloat 4s ease-in-out infinite; will-change: transform; }
  @media (prefers-reduced-motion: reduce) { .mascot-float { animation: none; } }

  /* BGM toggle */
  .bgm-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    width: 56px; height: 56px; border-radius: 9999px;
    background: #FFC107; color: #1b1c1e;
    border: 0; cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 24px rgba(255,193,7,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, background .15s;
  }
  .bgm-toggle:hover { background: #FFB300; transform: scale(1.1); }
  .bgm-toggle:active { transform: scale(0.95); }
  @media (max-width: 600px) {
    .bgm-toggle { width: 48px; height: 48px; bottom: 16px; right: 16px; }
  }

  /* Toast (기존) */
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1b1c1e; color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 1000;
    animation: toastIn .25s cubic-bezier(.2,.7,.3,1);
    display: flex; align-items: center; gap: 8px;
  }

  /* Mascot bubble (위저드 MascotSay) */
  .bubble {
    background: #fff; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px; font-size: 14px; color: #46474c;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  /* Focus ring */
  button:focus-visible, .opt-card:focus-visible, .chip:focus-visible {
    outline: 2px solid #FFC107; outline-offset: 2px;
  }

  /* Card hover (위저드 옵션 카드) */
  .opt-card { transition: all .15s; }
  .opt-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.06); }

  /* Chip (위저드/결과 내 chip 토글) */
  .chip {
    display: inline-flex; align-items: center; gap: 6px; height: 36px;
    padding: 0 16px; border-radius: 9999px; font-size: 14px;
    background: #f4f4f5; color: #37383c;
    border: 1px solid transparent; cursor: pointer; font-family: inherit;
    transition: all .12s; user-select: none;
  }
  .chip:hover { background: #ebebec; }
  .chip.on { background: #FFF8E1; color: #B07900; border-color: rgba(176,121,0,.3); font-weight: 500; }
  .chip.on:hover { background: #FFEEB8; }

  /* 기존 btn classes — Supanova 룩과 호환되는 pill 형태 유지 */
  .btn-primary {
    height: 48px; padding: 0 28px; border-radius: 9999px;
    background: #FFC107; color: #1b1c1e;
    border: 0; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit;
    transition: background .15s, transform .08s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: #FFB300; transform: scale(1.02); }
  .btn-primary:active { background: #FF9F00; transform: scale(0.98); }
  .btn-primary:disabled { background: #c2c4c8; cursor: not-allowed; transform: none; }

  .btn-ghost {
    height: 48px; padding: 0 28px; border-radius: 9999px;
    background: #fff; color: #46474c; border: 1px solid #e1e2e4;
    font-weight: 600; font-size: 15px; cursor: pointer; font-family: inherit;
    transition: background .15s, color .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ghost:hover { background: #fafafb; color: #1b1c1e; }

  /* Modal (기존) */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 32px;
    animation: fadeIn .15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(10px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-panel {
    background: #fff; border-radius: 20px; width: 100%; max-width: 600px;
    max-height: 90vh; overflow: auto; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: panelIn .22s cubic-bezier(.2,.7,.3,1);
  }
  .modal-actions {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    display: flex; gap: 6px;
  }
  .modal-icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 0;
    background: rgba(255,255,255,0.95); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    color: #37383c; padding: 0; font-family: inherit;
    transition: background .12s, color .12s, transform .08s;
  }
  .modal-icon-btn:hover { background: #fff; transform: translateY(-1px); }
  .modal-icon-btn:active { transform: translateY(0); }
  .modal-icon-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .modal-icon-btn.danger { color: #d83838; }
  .modal-icon-btn.danger:hover { background: #fff; color: #b81818; }

  @media (max-width: 600px) {
    .modal-backdrop { padding: 0; align-items: flex-end; }
    .modal-panel { border-radius: 16px 16px 0 0; max-height: 92vh; }
  }

  /* ───── Legacy 구조 클래스 — 점진적으로 Tailwind 로 이관 중 ───── */
  .app-shell { width: 100%; min-height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
  .body { flex: 1; position: relative; }

  /* result/hotpicks 페이지 */
  .result-page { flex: 1; padding: 120px 24px 64px; box-sizing: border-box; min-height: 100vh; background: #f7f7f8; }
  .result-inner { max-width: 1120px; margin: 0 auto; }
  .result-card { display: flex; gap: 24px; align-items: center; }
  .result-card-img { width: 200px; flex: 0 0 200px; }

  /* 제보 피드 — 3열 카드 그리드 */
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  @media (max-width: 900px) { .feed-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .feed-grid { grid-template-columns: 1fr; } }

  @media (max-width: 900px) {
    .result-card { flex-direction: column; gap: 16px; }
    .result-card-img { width: 100%; flex: 1 1 auto; }
    .result-page { padding: 96px 16px 48px; }
  }
</style>
</head>
<body class="overflow-x-hidden min-h-screen">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/config.js"></script>
<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/proto-data.jsx"></script>
<script type="text/babel" src="src/proto-app.jsx"></script>
</body>
</html>
