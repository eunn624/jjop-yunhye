<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>먹숭이 — 팀비 알차게 쓰자</title>
<link rel="stylesheet" href="wds/colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #fff; }
  body { font-family: var(--font-sans); color: #1b1c1e; }
  #root { min-height: 100vh; }

  /* Full-bleed app shell */
  .app-shell {
    width: 100%;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  .topnav {
    height: 72px; flex: 0 0 72px;
    border-bottom: 1px solid rgba(0,0,0,.06);
    display: flex; align-items: center; gap: 32px; padding: 0 48px;
    background: #fff;
    position: sticky; top: 0; z-index: 10;
  }
  .topnav .navlinks { display: flex; gap: 24px; font-size: 14px; color: #46474c; }
  .topnav .navlinks a { color: inherit; text-decoration: none; cursor: pointer; }
  .topnav .navlinks a.active { color: #B07900; font-weight: 600; }
  .topnav .spacer { flex: 1; }
  .topnav .pill {
    height: 36px; padding: 0 14px; border-radius: 9999px;
    background: #f4f4f5; display: inline-flex; align-items: center; gap: 6px; font-size: 14px;
    color: #46474c;
  }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#ffb86b,#ff6b6b); flex: 0 0 32px; }

  .body { flex: 1; position: relative; display: flex; flex-direction: column; }

  /* Responsive page containers */
  .landing-pad {
    background: #f7f7f8;
    flex: 1;
    padding: 88px 96px;
    box-sizing: border-box;
    min-height: calc(100vh - 72px);
  }
  .landing-hero {
    display: flex; align-items: center; gap: 80px;
    max-width: 1040px; margin: 0 auto;
  }
  .landing-foot { max-width: 1040px; margin: 72px auto 0; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 36px; }
  .wizard-page {
    padding: 64px 80px;
    max-width: 760px;
    margin: 0 auto;
    box-sizing: border-box;
    width: 100%;
  }
  .result-page {
    background: #f7f7f8;
    flex: 1;
    padding: 56px 72px 72px;
    box-sizing: border-box;
    min-height: calc(100vh - 72px);
  }
  .result-inner { max-width: 1040px; margin: 0 auto; }
  .result-card { display: flex; gap: 24px; }
  .result-card-img { width: 200px; flex: 0 0 200px; }
  .detail-grid {
    display: flex;
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 40px 64px;
    gap: 40px;
    box-sizing: border-box;
    width: 100%;
  }
  .detail-sidebar { width: 280px; flex: 0 0 280px; }

  @media (max-width: 900px) {
    .topnav { padding: 0 20px; gap: 14px; height: 60px; flex: 0 0 60px; }
    .topnav .navlinks { display: none; }
    .topnav .pill { display: none; }

    .landing-pad { padding: 40px 24px; min-height: calc(100vh - 60px); }
    .landing-hero { flex-direction: column; gap: 32px; }
    .wizard-page { padding: 36px 24px; }
    .result-page { padding: 32px 20px 48px; min-height: calc(100vh - 60px); }
    .result-card { flex-direction: column; gap: 16px; }
    .result-card-img { width: 100%; flex: 1 1 auto; }
    .detail-grid { flex-direction: column; padding: 24px 20px 48px; gap: 24px; }
    .detail-sidebar { width: 100%; flex: 1 1 auto; }
  }

  @media (max-width: 600px) {
    .landing-hero .mascot { width: 200px !important; height: 200px !important; }
  }

  @media (max-width: 500px) {
    .wizard-page { padding: 28px 18px; }
  }

  /* Reusable */
  .chip {
    display: inline-flex; align-items: center; gap: 6px; height: 36px;
    padding: 0 16px; border-radius: 9999px; font-size: 14px;
    background: #f4f4f5; color: #37383c;
    border: 1px solid transparent; cursor: pointer; font-family: inherit;
    transition: all .12s; user-select: none;
  }
  .chip:hover { background: #ebebec; }
  .chip.on { background: #FFF8E1; color: #B07900; border-color: rgba(176,121,0,.3); font-weight: 500; }
  .chip.on:hover { background: #FFEEB8; }

  .btn-primary {
    height: 48px; padding: 0 28px; border-radius: 9999px; background: #FFC107; color: #1b1c1e;
    border: 0; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit;
    transition: background .15s, transform .08s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: #FFB300; }
  .btn-primary:active { background: #FF9F00; }
  .btn-primary:disabled { background: #c2c4c8; cursor: not-allowed; }

  .btn-ghost {
    height: 48px; padding: 0 28px; border-radius: 9999px; background: transparent; color: #37383c;
    border: 1px solid rgba(0,0,0,0.1); font-weight: 500; font-size: 15px; cursor: pointer; font-family: inherit;
    transition: background .15s, border-color .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ghost:hover { background: #f7f7f8; border-color: rgba(0,0,0,0.18); }

  /* Step page transition */
  .step-enter { opacity: 0; transform: translateY(8px); }
  .step-shown { opacity: 1; transform: translateY(0);
    transition: opacity .35s cubic-bezier(.2,.7,.3,1), transform .35s cubic-bezier(.2,.7,.3,1); }

  /* 랜딩 마스코트 둥둥 떠있기 */
  @keyframes mascotFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  .mascot-float { animation: mascotFloat 4s ease-in-out infinite; will-change: transform; }

  /* 말풍선 — 살짝 흔들리도록 */
  @keyframes bubbleBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .bubble-bob { animation: bubbleBob 3.2s ease-in-out infinite; will-change: transform; }
  .bubble-bob.delay { animation-delay: 1.4s; }
  @media (prefers-reduced-motion: reduce) {
    .mascot-float, .bubble-bob { animation: none; }
  }

  /* Card hover */
  .opt-card { transition: all .15s; }
  .opt-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.06); }

  /* Slider */
  input[type=range].rg {
    -webkit-appearance: none; appearance: none;
    height: 6px; background: linear-gradient(to right, #FFC107 var(--p,30%), #e1e2e4 var(--p,30%));
    border-radius: 999px; outline: none; width: 100%;
  }
  input[type=range].rg::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%; background: #fff;
    border: 3px solid #FFC107; cursor: grab;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  input[type=range].rg::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: #fff;
    border: 3px solid #FFC107; cursor: grab; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  /* Toast */
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1b1c1e; color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 1000;
    animation: toastIn .25s cubic-bezier(.2,.7,.3,1);
    display: flex; align-items: center; gap: 8px;
  }

  /* Mascot bubble */
  .bubble {
    background: #fff; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px 16px 16px 4px;
    padding: 10px 14px; font-size: 14px; color: #46474c;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  /* Focus ring */
  button:focus-visible, .opt-card:focus-visible, .chip:focus-visible {
    outline: 2px solid #FFC107; outline-offset: 2px;
  }

  /* 제보 피드 — 3열 카드 그리드 (responsive) */
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  @media (max-width: 900px) {
    .feed-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .feed-grid { grid-template-columns: 1fr; }
  }

  /* BGM toggle (fixed bottom-right) */
  .bgm-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    width: 52px; height: 52px; border-radius: 50%;
    background: #FFC107; color: #1b1c1e;
    border: 0; font-size: 18px; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, background .15s, box-shadow .15s;
  }
  .bgm-toggle:hover { background: #FFB300; transform: scale(1.05);
    box-shadow: 0 8px 22px rgba(0,0,0,0.22); }
  .bgm-toggle:active { transform: scale(0.95); }
  @media (max-width: 600px) {
    .bgm-toggle { width: 44px; height: 44px; bottom: 16px; right: 16px; font-size: 16px; }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 32px;
    animation: fadeIn .15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(10px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-panel {
    background: #fff; border-radius: 16px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow: auto; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: panelIn .22s cubic-bezier(.2,.7,.3,1);
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px; z-index: 1;
    width: 32px; height: 32px; border-radius: 50%; border: 0;
    background: rgba(255,255,255,0.95); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .modal-close:hover { background: #fff; }

  @media (max-width: 600px) {
    .modal-backdrop { padding: 0; align-items: flex-end; }
    .modal-panel { border-radius: 16px 16px 0 0; max-height: 92vh; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/config.js"></script>
<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/proto-data.jsx"></script>
<script type="text/babel" src="src/proto-app.jsx"></script>
</body>
</html>
